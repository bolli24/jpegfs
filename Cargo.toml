[package]
name = "jpegfs"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
mozjpeg-sys = "2.2"
libc = "0.2"

sha256 = "1.6"

argon2 = { version = "0.5", features = ["std"] }
rand = "0.10"
rand_chacha = "0.10"

serde = "1.0"
postcard = { version = "1.1", features = ["use-std", "use-crc"] }
crc = "3.4"
